app:
  voice-interview:
    opening:
      skill-questions:
        bytedance-backend: >
          你好，我是本场面试官。我们先做一道算法与数据结构热身题：请从哈希表、堆、栈、队列、树、图里选两个，
          结合一道你熟悉的题，口述你的建模思路、关键步骤、复杂度、边界与反例。
        algorithm: >
          你好，我是本场面试官。第一个问题：请你口述一道算法题，不写代码，只讲”问题建模、数据结构选型、步骤、复杂度、边界处理”。
        ali-backend: >
          你好，我是本场面试官。第一个问题：请用 1 分钟介绍一个你深度参与的后端项目，重点说业务目标、你主导的技术决策、一次线上故障与修复。
        java-backend-tencent: >
          你好，我是本场面试官。第一个问题：请你结合一个真实项目，说明一次“网络或并发”问题的定位过程，包含现象、关键指标、根因和修复。
        java-backend: >
          你好，我是本场面试官。第一个问题：请用 1 分钟介绍一个你深度参与的后端项目，按”业务目标、核心链路、你的职责”回答。
        test-development: >
          你好，我是本场面试官。第一个问题：请你说一下你在测试开发方面的经历——比如参与过哪些测试项目，
          主要负责哪些测试类型（功能、自动化、性能、安全），用过什么工具或框架？
      algorithm-skills:
        - bytedance-backend
        - algorithm
      algorithm-question: >
        你好，我是本场面试官。先做一道算法与数据结构热身题：请你从“哈希表/堆/栈/队列/树/图”里选两个，
        结合一道你熟悉的题，口述“为什么选这个结构、核心步骤、时间复杂度、空间复杂度、边界条件与反例”。
        本场不需要写代码，重点看你的思路和取舍。
      backend-question: >
        你好，我是本场面试官。第一个问题：请用 1 分钟介绍一个你深度参与的后端项目，
        按三点回答：业务目标、你负责的核心模块、核心技术栈。说完我会立刻追问一个关键技术决策。
